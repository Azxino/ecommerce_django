{% extends 'dashboard/base_admin.html' %}
{% load static %}

{% block title %}Eliminar Categoría - Panel Admin{% endblock %}

{% block admin_content %}
<div class="card shadow-sm">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:4rem;"></i>
        <h3 class="mt-3">¿Eliminar categoría "{{ categoria.nombre }}"?</h3>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
                <a href="{% url 'dashboard:category_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
